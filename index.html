<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicial</title>

    <link rel="stylesheet" href="./libs/bootstrap-5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>

        <div class="container m-0 p-0">
            <div class="row">
                <div class="col-12">
                     <nav class="navbar">
                        <div class="container-fluid">
                            <a class="navbar-brand" href="#">
                                <img src="./images/logo-growflix.svg" alt="Logo Growflix" class="logo-growflix" >
                            </a>
                        </div>
                    </nav>
                </div>
            </div>
        </div>

    </header>

    <main>
        <div class="container">
            <div class="row">
                <div class="col-10 offset-1 text-center">
                    <h1 id="text-growcasts">Growcasts, webinars e muito mais. Sem limites.</h1>
                    <p class="fs-3 mt-3">Assista onde quiser</p>
                    <p class="fs-5 mt-4">Pronto para assistir?</p>
                    <button type="button" class="btn btn-danger btn-custon">Vamos la!</button>
                </div>
            </div>
        </div>





        <div class="container-fluid text-light">
            <div class="row bg-black py-4">
                <div class="col-10 offset-1 custom-col-1">
                    <h1 id="text-tv">Aproveite na TV.</h1>
                    <p class="fs-3">Assista em Smart TVs, PlayStation, Xbox, Chormecast e outros dispositivos.</p>
                </div>
                <div class="col-10 offset-1 custom-col-2">
                    <img src="./images/tela-tv-dia-dev.png" alt="Frase como é seu dia? e um homem sorrindo" class="img-1">
                </div>
            </div>
        </div>





    </main>

    <footer>


    </footer>

    <script src="./libs/bootstrap-5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
